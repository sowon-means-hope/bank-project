services:
  postgres:
    image: postgres:18
    container_name: bank-postgres

    environment:
      POSTGRES_DB: bank_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql

    networks:
      - bank-network

  app:
    build: .
    container_name: bank-app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

    networks:
       - bank-network

volumes:
  postgres-data:

networks:
  bank-network: